<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>优住 - 租房管理系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .hero-section {
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?auto=format&fit=crop&w=1350&q=80');
      background-size: cover;
      padding: 100px 0;
      color: white;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="#">优住租房</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="#">首页</a></li>
        <li class="nav-item"><a class="nav-link" href="#">找房</a></li>
        <li class="nav-item"><a class="nav-link" href="#">发布房源</a></li>
      </ul>

      <div class="d-flex align-items-center">
        <div th:if="${session.loginUser == null}">
          <a href="/login" class="btn btn-outline-primary me-2">登录</a>
          <a href="/register" class="btn btn-primary">注册</a>
        </div>
        <div class="dropdown" th:if="${session.loginUser != null}">
          <a class="btn btn-light dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <img src="https://via.placeholder.com/30" class="rounded-circle me-1">
            <span th:text="${session.loginUser.username}">用户名</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="/profile">个人中心</a></li>
            <li><a class="dropdown-item" href="/my-rentals">我的租约</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="/logout">退出登录</a></li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>

<header class="hero-section text-center">
  <div class="container">
    <h1 class="display-4 fw-bold">寻找您温馨的家</h1>
    <p class="lead">海量真实房源，租房从未如此简单</p>
    <div class="row justify-content-center mt-4">
      <div class="col-md-8">
        <form class="input-group input-group-lg shadow">
          <input type="text" class="form-control" placeholder="输入区域、街道或小区名...">
          <button class="btn btn-primary px-4" type="submit">搜索</button>
        </form>
      </div>
    </div>
  </div>
</header>

<main class="container my-5">
  <h3 class="mb-4">精选房源</h3>
  <div class="row g-4">
    <div class="col-md-4" th:each="i : ${#numbers.sequence(1, 3)}">
      <div class="card h-100 shadow-sm">
        <img src="https://via.placeholder.com/400x250" class="card-img-top" alt="房源图片">
        <div class="card-body">
          <h5 class="card-title text-truncate">长宁区 精装修两居室 近地铁</h5>
          <p class="text-danger fw-bold fs-4">¥ 4500 <small class="text-muted fs-6">/月</small></p>
          <p class="card-text text-muted">2室1厅1卫 | 85㎡</p>
          <a href="#" class="btn btn-outline-secondary w-100">查看详情</a>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
